<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin CRM | Elevate Digital</title>
  
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>

  <!-- Login Section -->
  <div class="admin-login-container" id="login-section">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon"><i class="ph-fill ph-lock-key"></i></div>
        <h2>Admin Portal</h2>
        <p>Login to manage client subscriptions.</p>
      </div>
      <form id="admin-login-form">
        <p id="login-error" class="validation-msg error"></p>
        
        <button type="button" class="btn btn-secondary btn-google" id="btn-google-login" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1rem; font-size: 1rem; padding: 1rem;">
          <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign in with Google
        </button>
      </form>
    </div>
  </div>

  <!-- Dashboard Section (Hidden until logged in) -->
  <div class="admin-dashboard-container" id="dashboard-section" style="display: none;">
    <!-- Top Nav -->
    <nav class="admin-nav">
      <div class="nav-brand">
        <div class="logo-icon"><i class="ph-fill ph-rocket-launch"></i></div>
        <span>Elevate Digital CRM</span>
      </div>
      <button class="btn btn-secondary" id="btn-logout"><i class="ph ph-sign-out"></i> Logout</button>
    </nav>

    <div class="dashboard-content">
      <div class="dashboard-header">
        <h1>Client Subscriptions</h1>
        <p>Track maintenance payments and upcoming renewals.</p>
      </div>

      <!-- Stats Row -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon" style="color: var(--accent); background: var(--accent-glow);"><i class="ph-fill ph-users"></i></div>
          <div class="stat-info">
            <span class="stat-label">Total Active Clients</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="color: var(--warning); background: rgba(251, 191, 36, 0.1);"><i class="ph-fill ph-clock"></i></div>
          <div class="stat-info">
            <span class="stat-label">Due Soon (≤ 10 Days)</span>
            <span class="stat-value" id="stat-due">0</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="color: var(--danger); background: rgba(248, 113, 113, 0.1);"><i class="ph-fill ph-warning-circle"></i></div>
          <div class="stat-info">
            <span class="stat-label">Overdue</span>
            <span class="stat-value" id="stat-overdue">0</span>
          </div>
        </div>
      </div>

      <!-- Clients Table -->
      <div class="table-wrapper">
        <table id="clients-table">
          <thead>
            <tr>
              <th>Client Name</th>
              <th>Contact Info</th>
              <th>Package & Cycle</th>
              <th>Next Due Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="clients-tbody">
            <!-- Populated by JS -->
            <tr>
              <td colspan="6" style="text-align: center; padding: 3rem;">
                <i class="ph ph-spinner ph-spin" style="font-size: 2rem; color: var(--accent);"></i>
                <p style="margin-top: 1rem;">Loading clients...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Firebase Scripts (Modular Version v9/v10 compatible approach via imports in main JS file) -->
  <script type="module" src="js/admin.js"></script>
</body>

</html>
